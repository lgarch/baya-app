<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réservation - Baya House ⭐</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="navbar">
    <div class="logo">Baya House <span>⭐</span></div>

    <nav>
      <ul class="nav-links" id="nav-menu">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="appartements.html">Appartements</a></li>
        <li><a href="chambres.html">Chambres</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <!-- Les trois points -->
    
  </header>

  <section class="page-header" style="padding-top: 120px; text-align: center; margin-bottom: 40px;">
    <h1
      style="font-size: 48px; background: linear-gradient(to right, #fff, #a0a0a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      Réserver un logement</h1>
    <p style="color: var(--text-muted); font-size: 18px; margin-top: 10px;">Remplissez le formulaire pour envoyer votre
      demande sur WhatsApp</p>
  </section>

  <section class="section" style="padding-top: 0;">
    <div class="split-layout">
      <!-- Colonne Appartements -->
      <div class="column">
        <div class="column-header">
          <h2 style="color: var(--primary-color); font-family: 'Playfair Display', serif; margin-bottom: 30px; text-align: center;">Réserver un Appartement</h2>
        </div>
        <div class="grid" id="apartments-list" style="grid-template-columns: 1fr;">
          <!-- Injecté par JS -->
        </div>
      </div>

      <!-- Colonne Chambres -->
      <div class="column">
        <div class="column-header">
          <h2 style="color: var(--primary-color); font-family: 'Playfair Display', serif; margin-bottom: 30px; text-align: center;">Réserver une Chambre</h2>
        </div>
        <div class="grid" id="rooms-list" style="grid-template-columns: 1fr;">
          <!-- Injecté par JS -->
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Baya House ⭐ - Tous droits réservés.</p>
  </footer>

  <script src="data.js"></script>
  <script src="reservation.js"></script>

</body>

</html>
