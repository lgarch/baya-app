<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Baya House</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="../data.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="admin-navbar">
    <div class="logo">Baya House <span>⭐</span> Admin</div>
    <div>
      <button id="import-btn" class="btn secondary-btn" style="margin-right: 15px;">Importer data.js</button>
      <span id="user-email" style="margin-right: 20px; color: var(--text-muted);"></span>
      <button id="logout-btn" class="btn danger-btn">Déconnexion</button>
    </div>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h2>Gestion des Logements</h2>
    </div>
    <div class="split-layout">
      <!-- Colonne Appartements -->
      <div class="column">
        <div class="column-header">
          <h3>Appartements</h3>
          <button id="add-apartment-btn" class="btn primary-btn">+ Ajouter un appartement</button>
        </div>
        <div class="card-list" id="apartments-list">
          <p style="color: var(--text-muted);">Chargement des appartements...</p>
        </div>
      </div>

      <!-- Colonne Chambres -->
      <div class="column">
        <div class="column-header">
          <h3>Chambres</h3>
          <button id="add-room-btn" class="btn primary-btn">+ Ajouter une chambre</button>
        </div>
        <div class="card-list" id="rooms-list">
          <p style="color: var(--text-muted);">Chargement des chambres...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal d'Ajout / Modification -->
  <div class="modal" id="form-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Ajouter un logement</h3>
        <button class="close-btn" id="close-form-btn">&times;</button>
      </div>
      <form id="apartment-form">
        <input type="hidden" id="doc-id">
        <input type="hidden" id="collection-type">
        <div class="form-group">
          <label>Nom du logement</label>
          <input type="text" id="name" required placeholder="Ex: Appartement 1">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" required placeholder="Description détaillée..."></textarea>
        </div>
        <div class="form-group">
          <label>Prix par nuit (MAD)</label>
          <input type="number" id="price" required placeholder="Ex: 500">
        </div>
        <div class="form-group">
          <label>Capacité max (Personnes)</label>
          <input type="number" id="maxGuests" required placeholder="Ex: 4">
        </div>
        <div class="form-group">
          <label>URL de l'image principale</label>
          <input type="text" id="image" required placeholder="Ex: Images/apt10.png">
        </div>
        <button type="submit" class="btn primary-btn full-width">Enregistrer</button>
      </form>
    </div>
  </div>

  <!-- Modal Calendrier de Disponibilité -->
  <div class="modal" id="calendar-modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3>Disponibilités : <span id="cal-apt-name"></span></h3>
        <button class="close-btn" id="close-cal-btn">&times;</button>
      </div>
      
      <p style="margin-bottom: 20px; color: var(--text-muted);">
        Cliquez sur une date pour bloquer/débloquer la disponibilité.
      </p>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button id="prev-month" class="btn secondary-btn">&lt; Précédent</button>
        <h4 id="current-month-year">Mois Année</h4>
        <button id="next-month" class="btn secondary-btn">Suivant &gt;</button>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button id="block-all-btn" class="btn danger-btn full-width">Bloquer tout le mois</button>
        <button id="unblock-all-btn" class="btn secondary-btn full-width">Débloquer tout</button>
      </div>

      <div class="calendar-grid" id="calendar-grid">
        <!-- Les jours seront générés ici par JS -->
      </div>

      <button id="save-dates-btn" class="btn primary-btn full-width" style="margin-top: 20px;">Sauvegarder les dates</button>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
