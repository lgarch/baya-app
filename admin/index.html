<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baya House - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="logo">Baya House <span>⭐</span> Admin</div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@bayahouse.com" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn primary-btn full-width" id="login-btn">Se connecter</button>
      <p id="error-msg" class="error-msg"></p>
    </form>
  </div>

  <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
  <script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = "Connexion...";
      errorMsg.textContent = "";

      if (email === 'admin@gmail.com' && password === 'admin') {
        localStorage.setItem('admin_logged_in', 'true');
        window.location.href = "dashboard.html";
      } else {
        btn.disabled = false;
        btn.textContent = "Se connecter";
        errorMsg.textContent = "Email ou mot de passe incorrect.";
      }
    });
  </script>
</body>
</html>
